<div class="signup-container">
    <h2>Sign Up</h2>

    <form [formGroup]="signupForm" (ngSubmit)="register()">

        <!-- Name -->
        <input type="text" placeholder="Name" formControlName="name">
        <small *ngIf="signupForm.get('name')?.touched && signupForm.get('name')?.invalid">
            Name must be at least 3 characters
        </small>

        <!-- Email -->
        <input type="email" placeholder="Email" formControlName="email">
        <small *ngIf="signupForm.get('email')?.touched && signupForm.get('email')?.invalid">
            Enter a valid email
        </small>

        <!-- Password -->
        <input type="password" placeholder="Password" formControlName="password">
        <small *ngIf="signupForm.get('password')?.touched && signupForm.get('password')?.invalid">
            Password must be at least 6 characters
        </small>

        <!-- Confirm Password -->
        <input type="password" placeholder="Confirm Password" formControlName="confirmPassword">
        <small *ngIf="signupForm.get('confirmPassword')?.touched && signupForm.get('confirmPassword')?.invalid">
            Confirm Password is required
        </small>

        <button type="submit" [disabled]="signupForm.invalid">
            Register
        </button>

    </form>
</div>
